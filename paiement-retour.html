<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retour paiement | Macemay custom</title>
    <link rel="stylesheet" href="styles.css?v=macemay-5">
    <link rel="stylesheet" href="site-refonte.css?v=macemay-21">
</head>
<body>
    <main class="payment-return-page">
        <section class="payment-return-card">
            <img src="images/logo-macemay.png" alt="Macemay custom" class="payment-return-logo">
            <p class="payment-return-kicker">Paiement PayPal</p>
            <h1 id="paymentReturnTitle">Vérification du paiement</h1>
            <p id="paymentReturnStatus">Nous vérifions le statut de votre commande.</p>
            <a href="index.html" class="btn btn-primary">Retour à l'accueil</a>
        </section>
    </main>

    <script src="site-config.js?v=macemay-6"></script>
    <script src="script.js?v=macemay-10"></script>
    <script>
        (async function () {
            const title = document.getElementById('paymentReturnTitle');
            const status = document.getElementById('paymentReturnStatus');
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('order');

            if (!orderId) {
                title.textContent = 'Commande introuvable';
                status.textContent = 'Aucun numéro de commande n\'a été transmis.';
                return;
            }

            const config = window.MACEMAY_CONFIG || {};
            const endpoint = config.orderStatusUrl || 'api/order-status.php';

            try {
                const response = await fetch(endpoint + '?order=' + encodeURIComponent(orderId));
                const order = await response.json();
                if (!response.ok) throw new Error(order.error || 'Statut indisponible');

                if (order.status === 'paid') {
                    localStorage.removeItem('cart');
                    localStorage.removeItem('macemay_pending_paypal_order');
                    title.textContent = 'Paiement confirmé';
                    status.textContent = 'Votre commande ' + order.id + ' a bien été enregistrée.';
                    return;
                }

                title.textContent = 'Paiement en cours de validation';
                status.textContent = 'Votre commande ' + order.id + ' est en statut « ' + order.status + ' ». PayPal peut nécessiter quelques instants pour confirmer le paiement.';
            } catch (error) {
                console.error(error);
                title.textContent = 'Vérification indisponible';
                status.textContent = 'Le paiement peut avoir été accepté, mais le statut n\'est pas encore disponible. Contactez-nous avec la référence ' + orderId + '.';
            }
        })();
    </script>
</body>
</html>
