<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <rect width="100" height="120" fill="#ffffff" />
  <!-- Hauts-de-France official regional logo -->
  <!-- Stylized outline heart map -->
  <g stroke="#0F58A2" stroke-width="3" fill="none" stroke-linejoin="round" transform="translate(0, 5)">
    <path d="M 50 25 C 38 10, 18 15, 18 35 C 18 55, 50 78, 50 78 C 50 78, 82 55, 82 35 C 82 15, 62 10, 50 25 Z" stroke="#0F58A2" stroke-width="7" />
    <path d="M 50 25 C 38 10, 18 15, 18 35 C 18 55, 50 78, 50 78 C 50 78, 82 55, 82 35 C 82 15, 62 10, 50 25 Z" fill="#31AF3F" opacity="0.15" />
    <!-- Embedded blue letter H in center -->
    <path d="M 38 32 V 55 M 62 32 V 55 M 38 43 H 62" stroke="#0F58A2" stroke-width="8" stroke-linecap="round" />
  </g>
  <!-- Text -->
  <text x="50" y="100" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="bold" font-size="5.5" fill="#4B5563" text-anchor="middle" letter-spacing="0.8">RÉGION</text>
  <text x="50" y="112" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="950" font-size="9" fill="#0F58A2" text-anchor="middle">Hauts-de-France</text>
</svg>