    <path d="M 54 52 C 54 52, 44 65, 38 72 C 34 78, 42 82, 45 78 C 48 74, 56 68, 56 68" fill="none" stroke="#9D0208" stroke-width="5" stroke-linecap="round" />
    <path d="M 45 42 Q 38 48, 30 52 C 26 55, 28 62, 34 58" fill="none" stroke="#9D0208" stroke-width="4" stroke-linecap="round" />
