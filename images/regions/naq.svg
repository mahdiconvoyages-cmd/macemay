  <text x="50" y="101" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="bold" font-size="5.5" fill="#4B5563" text-anchor="middle" letter-spacing="1">RÉGION</text>
  <text x="50" y="113" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="950" font-size="8.5" fill="#9D0208" text-anchor="middle" letter-spacing="0.2">Nouvelle-Aquitaine</text>
</svg>