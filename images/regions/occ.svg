<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <rect width="100" height="120" fill="#C61D42" />
  <!-- Occitanie official plate design: Red field, Occitan Cross left, Catalan Bars right -->
  <!-- Occitan cross left -->
  <g fill="#F2B84B" transform="translate(-10, 0)">
    <path d="M 50 25 L 53 45 L 73 42 L 63 50 L 73 58 L 53 55 L 50 75 L 47 55 L 27 58 L 37 50 L 27 42 L 47 45 Z" />
    <!-- Pommettes -->
    <circle cx="50" cy="22" r="3" />
    <circle cx="43" cy="25" r="3" />
    <circle cx="57" cy="25" r="3" />
    <circle cx="76" cy="50" r="3" />
    <circle cx="73" cy="43" r="3" />
    <circle cx="73" cy="57" r="3" />
    <circle cx="50" cy="78" r="3" />
    <circle cx="43" cy="75" r="3" />
    <circle cx="57" cy="75" r="3" />
    <circle cx="24" cy="50" r="3" />
    <circle cx="27" cy="43" r="3" />
    <circle cx="27" cy="57" r="3" />
    <circle cx="50" cy="50" r="4.5" fill="#C61D42" />
  </g>
  <!-- Catalan lines in right 20% of the logo box -->
  <g fill="#F2B84B" opacity="0.9">
    <rect x="74" y="20" width="3.5" height="60" />
    <rect x="81" y="20" width="3.5" height="60" />
    <rect x="88" y="20" width="3.5" height="60" />
    <rect x="95" y="20" width="3.5" height="60" />
  </g>
  <!-- Text -->
  <text x="50" y="101" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="bold" font-size="5" fill="#ffffff" opacity="0.8" text-anchor="middle" letter-spacing="1.2">RÉGION</text>
  <text x="50" y="113" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="950" font-size="11" fill="#F2B84B" text-anchor="middle" letter-spacing="0.5">OCCITANIE</text>
</svg>