<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <rect width="100" height="120" fill="#0067B1" />
  <!-- Provence-Alpes-Côte d'Azur / Région Sud official plate logo -->
  <!-- Comprehensive quarterly arms shield -->
  <g stroke="#ffffff" stroke-width="1" stroke-linejoin="round" transform="translate(0, -2)">
    <!-- Shield Container -->
    <path d="M 22 18 H 78 V 58 C 78 72, 50 82, 50 82 C 50 82, 22 72, 22 58 Z" fill="#ffffff" stroke="#ffffff" stroke-width="2.5" />
    
    <!-- Q1 & Q4: Provence/Catalan red & gold bars -->
    <g clip-path="url(#pac-q1)">
      <path d="M 22 18 H 50 V 50 H 22 Z" fill="#F5A623" />
      <rect x="25" y="18" width="4.5" height="32" fill="#C61D42" />
      <rect x="34" y="18" width="4.5" height="32" fill="#C61D42" />
      <rect x="43" y="18" width="4.5" height="32" fill="#C61D42" />
    </g>
    <g clip-path="url(#pac-q4)">
      <path d="M 50 50 H 78 V 82 H 50 Z" fill="#F5A623" />
      <rect x="53" y="50" width="4.5" height="32" fill="#C61D42" />
      <rect x="62" y="50" width="4.5" height="32" fill="#C61D42" />
      <rect x="71" y="50" width="4.5" height="32" fill="#C61D42" />
    </g>
    
    <!-- Q2: Dauphiné (Gold dolphin on blue) -->
    <g clip-path="url(#pac-q2)">
      <path d="M 50 18 H 78 V 50 H 50 Z" fill="#0067B1" />
      <path d="M 56 40 C 54 32, 62 24, 71 24 C 77 24, 79 30, 73 36 M 66 32 C 70 32, 72 38, 68 42" fill="none" stroke="#F5A623" stroke-width="3" stroke-linecap="round" />
      <circle cx="68" cy="28" r="1.5" fill="#C61D42" />
    </g>
    
    <!-- Q3: Nice (Red eagle on white/silver mount) -->
    <g clip-path="url(#pac-q3)">
      <path d="M 22 50 H 50 V 82 H 22 Z" fill="#ffffff" />
      <path d="M 26 78 C 29 68, 36 58, 36 53 C 36 58, 43 68, 46 78 Z" fill="#C61D42" />
      <path d="M 29 62 L 36 55 L 43 62" stroke="#C61D42" stroke-width="3" stroke-linecap="round" />
    </g>
  </g>
  <!-- Divider -->
  <line x1="50" y1="16" x2="50" y2="80" stroke="#ffffff" stroke-width="1.5" />
  <line x1="22" y1="48" x2="78" y2="48" stroke="#ffffff" stroke-width="1.5" />
  
  <text x="50" y="101" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="bold" font-size="5.5" fill="#ffffff" opacity="0.8" text-anchor="middle" letter-spacing="0.5">RÉGION SUD</text>
  <text x="50" y="113" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="950" font-size="6.5" fill="#F5A623" text-anchor="middle" letter-spacing="0.2">PROVENCE-ALPES-CÔTE D'AZUR</text>
  
  <defs>
    <clipPath id="pac-q1"><rect x="22" y="18" width="28" height="32" /></clipPath>
    <clipPath id="pac-q2"><rect x="50" y="18" width="28" height="32" /></clipPath>
    <clipPath id="pac-q3"><rect x="22" y="50" width="28" height="32" /></clipPath>
    <clipPath id="pac-q4"><rect x="50" y="50" width="28" height="32" /></clipPath>
  </defs>
</svg>