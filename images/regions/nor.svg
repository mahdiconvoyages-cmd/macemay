  <circle cx="30" cy="52" r="1.2" fill="#005C9E" />
  <text x="50" y="112" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="950" font-size="10.5" fill="#ffffff" text-anchor="middle" letter-spacing="1">NORMANDIE</text>
</svg>