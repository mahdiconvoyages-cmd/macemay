  <path d="M 28 32 C 32 30, 40 32, 45 28 C 50 24, 60 28, 68 25 C 75 22, 82 28, 80 35 C 78 42, 85 48, 82 55 C 78 62, 72 58, 68 65 C 64 72, 58 75, 52 70 C 45 65, 38 72, 32 68 C 26 64, 22 55, 25 45 C 28 35, 24 34, 28 32 Z" fill="#0F519F" />
