  <text x="50" y="110" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="950" font-size="7.5" fill="#0F519F" text-anchor="middle" letter-spacing="0.2">Auvergne-Rhône-Alpes</text>
